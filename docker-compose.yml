
services:
  opencode:
    build:
      context: ./frameworks/opencode
      dockerfile: Dockerfile
    container_name: agent-test-env-opencode
    hostname: opencode
    volumes:
      - ./fixtures:/fixtures:ro
      - opencode_skills:/root/.opencode/skills
    networks:
      - agent-test-network
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "/scripts/verify.sh"]
      interval: 10s
      retries: 5
      start_period: 30s

  claude-code:
    build:
      context: ./frameworks/claude-code
      dockerfile: Dockerfile
    container_name: agent-test-env-claude-code
    hostname: claude-code
    volumes:
      - ./fixtures:/fixtures:ro
      - claude_skills:/root/.claude/skills
    networks:
      - agent-test-network
    tty: true
    stdin_open: true

  codex-cli:
    build:
      context: ./frameworks/codex-cli
      dockerfile: Dockerfile
    container_name: agent-test-env-codex-cli
    hostname: codex-cli
    volumes:
      - ./fixtures:/fixtures:ro
      - codex_skills:/root/.codex/skills
    networks:
      - agent-test-network
    tty: true
    stdin_open: true

  gemini-cli:
    build:
      context: ./frameworks/gemini-cli
      dockerfile: Dockerfile
    container_name: agent-test-env-gemini-cli
    hostname: gemini-cli
    volumes:
      - ./fixtures:/fixtures:ro
      - gemini_skills:/root/.gemini/skills
    networks:
      - agent-test-network
    tty: true
    stdin_open: true

  continue:
    build:
      context: ./frameworks/continue
      dockerfile: Dockerfile
    container_name: agent-test-env-continue
    hostname: continue
    volumes:
      - ./fixtures:/fixtures:ro
      - continue_skills:/root/.continue/skills
    networks:
      - agent-test-network
    tty: true
    stdin_open: true

networks:
  agent-test-network:
    name: agent-test-network
    driver: bridge

volumes:
  opencode_skills:
  claude_skills:
  codex_skills:
  gemini_skills:
  continue_skills:
