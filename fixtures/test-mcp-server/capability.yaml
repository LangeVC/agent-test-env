name: test-mcp-server
version: 1.0.0
kind: mcp-server
description: Test MCP Server for agent-test-env — validates MCP discovery lifecycle
author: agent-test-env
runtimes:
  node: ">=18"
mcp:
  transport: stdio
  command: node
  args: ["server.js"]
  supported_clients:
    - opencode
    - claude-code
    - codex-cli
    - gemini-cli
    - continue
    - cursor
